info:
  name: change-password.patch.ts
  type: http
  seq: 3

http:
  method: PATCH
  url: https://localhost:3000/api/auth/change-password
  body:
    type: json
    data: |-
      {
        "oldPassword": "myPassword",
        "newPassword": "newPassword",
        "confirmPassword": "newPassword"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
